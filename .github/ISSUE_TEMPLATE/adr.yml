name: Architecture Decision Record
description: Propose an architecture decision (for L2/L3 features)
title: "adr(ADR-xxx): "
labels: ["adr", "architecture"]
body:
  - type: input
    id: adr-id
    attributes:
      label: ADR ID
      placeholder: "ADR-001"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What problem is this decision addressing? What areas are affected?
      placeholder: |
        **Problem:** …

        **Affected areas:** …

        **Criteria:**
        - Performance (%)
        - Maintainability (%)
        - Cost (%)
    validations:
      required: true

  - type: textarea
    id: options
    attributes:
      label: Options
      placeholder: |
        **Option A – Name**
        - Pros: …
        - Cons: …

        **Option B – Name**
        - Pros: …
        - Cons: …
    validations:
      required: true

  - type: textarea
    id: decision
    attributes:
      label: Decision
      placeholder: |
        **Chosen:** Option X – Name

        **Rationale:**
        - …
    validations:
      required: true

  - type: textarea
    id: consequences
    attributes:
      label: Consequences
      value: |
        **Easier:**
        -

        **Harder / trade-offs:**
        -
    validations:
      required: true

  - type: input
    id: related-specs
    attributes:
      label: Related Feature Specs
      placeholder: "F001, F002"
    validations:
      required: false
