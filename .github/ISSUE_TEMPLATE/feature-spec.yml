name: Feature Spec
description: Propose a new feature using the SDD spec format
title: "feat(Fxxx): "
labels: ["spec", "feature"]
body:
  - type: input
    id: spec-id
    attributes:
      label: Spec ID
      placeholder: "F001"
    validations:
      required: true

  - type: dropdown
    id: complexity
    attributes:
      label: Complexity
      options:
        - "L1 – trivial (no ADR needed)"
        - "L2 – normal (ADR if architecture affected)"
        - "L3 – architecture-impact (ADR required)"
    validations:
      required: true

  - type: textarea
    id: intent
    attributes:
      label: Intent
      description: What should this feature achieve? Which user/problem does it serve?
      placeholder: "1–3 sentences"
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and explicitly out of scope?
      value: |
        **In scope:**
        -

        **Out of scope:**
        -
    validations:
      required: true

  - type: textarea
    id: business-rules
    attributes:
      label: Business Rules
      placeholder: |
        - Rule 1: …
        - Rule 2: …
    validations:
      required: true

  - type: textarea
    id: contracts
    attributes:
      label: Contracts
      description: API endpoints, data models, events
      placeholder: |
        ### API
        - Endpoint: `POST /path`
        - Request: …
        - Response (200): …

        ### Data model
        - Entity: …
    validations:
      required: false

  - type: textarea
    id: scenarios
    attributes:
      label: Scenarios (Given / When / Then)
      placeholder: |
        1. Scenario – Title
           Given …
           When …
           Then …
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      value: |
        - [ ] Critical business rules covered by automated tests
        - [ ] All Contracts implemented exactly as specified
        - [ ] All scenarios implemented as automated tests
        - [ ] Negative paths (errors, edge cases) tested
    validations:
      required: true
