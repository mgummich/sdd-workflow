<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="SDD Workflow Template">
  <title>SDD Workflow Template</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="docFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="badgeFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d4d4d8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
  </g>

  <g transform="translate(140, 192) scale(1.0)">
    <g filter="url(#shadow)">
      <path d="M68 32 H148 L188 72 V200 a16 16 0 0 1 -16 16 H68 a16 16 0 0 1 -16 -16 V48 a16 16 0 0 1 16 -16 z"
            fill="url(#docFill)" stroke="#f5f5f5" stroke-width="10" stroke-linejoin="round"/>
      <path d="M148 32 V64 a8 8 0 0 0 8 8 H188"
            fill="none" stroke="#f5f5f5" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
    </g>

    <g stroke="#f5f5f5" stroke-width="8" stroke-linecap="round">
      <line x1="76" y1="104" x2="164" y2="104"/>
      <line x1="76" y1="132" x2="164" y2="132"/>
      <line x1="76" y1="160" x2="140" y2="160"/>
      <line x1="76" y1="188" x2="116" y2="188"/>
    </g>

    <g filter="url(#shadow)">
      <circle cx="196" cy="196" r="44" fill="url(#badgeFill)"/>
      <circle cx="196" cy="196" r="44" fill="none" stroke="#000000" stroke-width="3" stroke-opacity="0.15"/>
      <path d="M176 198 L190 212 L218 180"
            fill="none" stroke="#0a0a0a" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <g transform="translate(540, 248)" fill="#f5f5f5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="0" y="0" font-size="84" font-weight="800" letter-spacing="-2">SDD Workflow</text>
    <text x="0" y="56" font-size="32" font-weight="400" fill="#a1a1aa">Spec-driven development for AI-assisted projects</text>
    <g transform="translate(0, 116)" font-size="24" font-weight="500" fill="#71717a">
      <text x="0" y="0">Spec → Approve → Implement → Verify</text>
    </g>
  </g>

  <g transform="translate(140, 560)" fill="#52525b" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="20">
    <text x="0" y="0">github.com/mgummich/sdd-workflow</text>
  </g>
</svg>
