<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="SDD Workflow">
  <title>SDD Workflow</title>
  <defs>
    <linearGradient id="docFillDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="badgeFillDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d4d4d8"/>
    </linearGradient>
    <filter id="softShadowDark" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g filter="url(#softShadowDark)">
    <path d="M68 32 H148 L188 72 V200 a16 16 0 0 1 -16 16 H68 a16 16 0 0 1 -16 -16 V48 a16 16 0 0 1 16 -16 z"
          fill="url(#docFillDark)" stroke="#f5f5f5" stroke-width="10" stroke-linejoin="round"/>
    <path d="M148 32 V64 a8 8 0 0 0 8 8 H188"
          fill="none" stroke="#f5f5f5" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <g stroke="#f5f5f5" stroke-width="8" stroke-linecap="round">
    <line x1="76" y1="104" x2="164" y2="104"/>
    <line x1="76" y1="132" x2="164" y2="132"/>
    <line x1="76" y1="160" x2="140" y2="160"/>
    <line x1="76" y1="188" x2="116" y2="188"/>
  </g>

  <g filter="url(#softShadowDark)">
    <circle cx="196" cy="196" r="44" fill="url(#badgeFillDark)"/>
    <circle cx="196" cy="196" r="44" fill="none" stroke="#000000" stroke-width="3" stroke-opacity="0.15"/>
    <path d="M176 198 L190 212 L218 180"
          fill="none" stroke="#0a0a0a" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
